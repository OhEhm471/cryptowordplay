version: "3.9"

# ============================================================
# CryptoWordplay — Local Development Stack
#
# Usage:
#   docker compose up            # start everything
#   docker compose up -d         # start in background
#   docker compose up backend    # start only backend + deps
#   docker compose logs -f backend
#   docker compose down          # stop (keeps volumes)
#   docker compose down -v       # stop + wipe databases
#
# After first start, run migrations:
#   docker compose exec backend npm run migrate:all
# ============================================================

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       cryptowordplay
      POSTGRES_USER:     cwp
      POSTGRES_PASSWORD: cwpdev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cwp -d cryptowordplay"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Backend ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://cwp:cwpdev@postgres:5432/cryptowordplay
      REDIS_URL:    redis://redis:6379
      NODE_ENV:     development
      PORT:         3001
    ports:
      - "3001:3001"
    volumes:
      - ./backend/src:/app/src   # hot reload via nodemon
    command: npm run dev
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Frontend ───────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3001/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  # ── Admin Panel ────────────────────────────────────────────
  admin:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3001/api
    ports:
      - "5174:5174"
    volumes:
      - ./admin:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
  redis_data:
