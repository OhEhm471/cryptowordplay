version: "3.9"

# ============================================================
# Test database stack — CI / local test runs
#
# Starts only Postgres + Redis with test-specific credentials.
# No application services — tests import the app directly.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   cd backend && npm test
#   docker compose -f docker-compose.test.yml down -v
#
# CI (GitHub Actions) example:
#   services:
#     postgres:
#       image: postgres:16-alpine
#       env:
#         POSTGRES_DB: cwp_test
#         POSTGRES_USER: cwp_test
#         POSTGRES_PASSWORD: cwp_test
#     redis:
#       image: redis:7-alpine
# ============================================================

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       cwp_test
      POSTGRES_USER:     cwp_test
      POSTGRES_PASSWORD: cwp_test
    ports:
      - "5433:5432"   # port 5433 so it doesn't clash with dev postgres on 5432
    tmpfs:
      - /var/lib/postgresql/data  # in-memory — no persistence between runs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cwp_test -d cwp_test"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"   # port 6380 so it doesn't clash with dev redis on 6379
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
